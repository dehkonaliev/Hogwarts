{% extends template_name %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-white mb-2">Update Profile</h1>
    <p class="text-slate-400">Modify your personal information and account settings.</p>
</div>

<div class="max-w-xl">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-8 shadow-lg">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="text-slate-200 text-sm space-y-4 [&>p>label]:block [&>p>label]:text-xs [&>p>label]:text-slate-400 [&>p>label]:uppercase [&>p>label]:font-semibold [&>p>label]:mb-1 [&>p>input]:w-full [&>p>input]:bg-slate-900 [&>p>input]:border [&>p>input]:border-slate-700 [&>p>input]:rounded-lg [&>p>input]:p-3 [&>p>input]:text-white">
                {{ form.as_p }}
            </div>

            <div class="flex items-center gap-4 pt-4 border-t border-slate-700">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-all">
                    Save Changes
                </button>
                <a href="{% url 'my-profile' %}" class="text-slate-400 hover:text-white text-sm font-semibold transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
