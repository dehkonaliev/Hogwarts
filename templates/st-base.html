<!DOCTYPE html>
<html lang="uz" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Control Panel{% endblock %} · Hogwarts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Manrope', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: '#0A0F1C',
                        surface: '#111827',
                        raised: '#182236',
                        line: '#232E45',
                        accent: {
                            DEFAULT: '#5B6EF5',
                            dim: '#3B4A9E',
                        },
                        gold: '#F0B23C',
                        muted: '#8B94A8',
                    },
                    boxShadow: {
                        panel: '0 1px 0 0 rgba(255,255,255,0.03) inset',
                    },
                },
            },
        }
    </script>
    <style>
        html, body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Manrope', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #232E45; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #2E3B57; }
        .nav-link { position: relative; }
        .nav-link::before {
            content: ''; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
            width: 3px; height: 0; border-radius: 2px; background: #5B6EF5; transition: height .18s ease;
        }
        .nav-link.active::before { height: 22px; }
        [x-cloak] { display: none !important; }

        /* Ambient background — a quiet, candlelit study hall under a night sky */
        .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; background: radial-gradient(ellipse 90% 70% at 50% -10%, #171233 0%, #0A0F1C 55%, #07090F 100%); }

        /* Twinkling starfield, two parallax layers */
        .bg-stars, .bg-stars-far {
            position: absolute; inset: -10% -10%;
            background-repeat: repeat;
        }
        .bg-stars {
            background-image:
                radial-gradient(1.6px 1.6px at 40px 60px, rgba(255,255,255,.9), transparent),
                radial-gradient(1.2px 1.2px at 140px 20px, rgba(255,255,255,.7), transparent),
                radial-gradient(1.8px 1.8px at 220px 100px, rgba(240,178,60,.85), transparent),
                radial-gradient(1.2px 1.2px at 300px 150px, rgba(255,255,255,.6), transparent),
                radial-gradient(1.6px 1.6px at 60px 180px, rgba(255,255,255,.8), transparent),
                radial-gradient(1.4px 1.4px at 340px 40px, rgba(255,255,255,.65), transparent);
            background-size: 380px 260px;
            animation: stars-drift 160s linear infinite, stars-twinkle 4.5s ease-in-out infinite alternate;
        }
        .bg-stars-far {
            background-image:
                radial-gradient(1px 1px at 80px 40px, rgba(255,255,255,.5), transparent),
                radial-gradient(1px 1px at 200px 120px, rgba(255,255,255,.4), transparent),
                radial-gradient(1.4px 1.4px at 320px 200px, rgba(240,178,60,.5), transparent),
                radial-gradient(1px 1px at 260px 60px, rgba(255,255,255,.35), transparent);
            background-size: 460px 320px;
            opacity: .6;
            animation: stars-drift 260s linear infinite reverse, stars-twinkle 6s ease-in-out infinite alternate-reverse;
        }
        @keyframes stars-drift { from { background-position: 0 0; } to { background-position: -380px -260px; } }
        @keyframes stars-twinkle { from { opacity: .55; } to { opacity: 1; } }

        /* Floating candle-glow lights */
        .candle { position: absolute; border-radius: 9999px; filter: blur(70px); will-change: transform, opacity; }
        .candle-1 {
            width: 380px; height: 380px; top: 8%; left: 10%;
            background: radial-gradient(circle at 35% 35%, rgba(240,178,60,.9), transparent 70%);
            animation: candle-flicker-1 5s ease-in-out infinite;
        }
        .candle-2 {
            width: 320px; height: 320px; bottom: 6%; right: 12%;
            background: radial-gradient(circle at 35% 35%, rgba(240,178,60,.8), transparent 70%);
            animation: candle-flicker-2 6.5s ease-in-out infinite;
        }
        .candle-3 {
            width: 300px; height: 300px; top: 42%; left: 48%;
            background: radial-gradient(circle at 35% 35%, rgba(91,110,245,.55), transparent 70%);
            animation: candle-flicker-3 7.5s ease-in-out infinite;
        }
        @keyframes candle-flicker-1 {
            0%, 100% { opacity: .16; transform: translateY(0) scale(1); }
            30% { opacity: .11; transform: translateY(-10px) scale(.96); }
            55% { opacity: .19; transform: translateY(6px) scale(1.05); }
            80% { opacity: .13; transform: translateY(-4px) scale(.99); }
        }
        @keyframes candle-flicker-2 {
            0%, 100% { opacity: .14; transform: translateY(0) scale(1); }
            35% { opacity: .1; transform: translateY(8px) scale(.97); }
            60% { opacity: .17; transform: translateY(-8px) scale(1.04); }
            85% { opacity: .12; transform: translateY(3px) scale(1); }
        }
        @keyframes candle-flicker-3 {
            0%, 100% { opacity: .09; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: .13; transform: translate(-48%, -53%) scale(1.08); }
        }

        /* Rising motes of golden dust, like candlelight caught in the air */
        .mote {
            position: absolute; bottom: -20px; border-radius: 9999px;
            background: radial-gradient(circle, rgba(240,178,60,.95), rgba(240,178,60,0) 70%);
            box-shadow: 0 0 6px 1px rgba(240,178,60,.5);
            opacity: 0; animation: mote-rise linear infinite;
        }
        @keyframes mote-rise {
            0% { transform: translate(0, 0); opacity: 0; }
            8% { opacity: .8; }
            50% { transform: translate(18px, -55vh); }
            92% { opacity: .4; }
            100% { transform: translate(-14px, -105vh); opacity: 0; }
        }

        /* Faint vignette to keep the corners quiet */
        .bg-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 40%, transparent 40%, rgba(7,9,15,.55) 100%);
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-stars, .bg-stars-far, .candle, .mote { animation: none !important; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full flex overflow-hidden bg-base text-slate-200 antialiased">

    <!-- Ambient animated background: a candlelit study hall under a night sky -->
    <div class="bg-scene" aria-hidden="true">
        <div class="bg-stars-far"></div>
        <div class="bg-stars"></div>
        <div class="candle candle-1"></div>
        <div class="candle candle-2"></div>
        <div class="candle candle-3"></div>

        <div class="mote" style="left:12%; width:3px; height:3px; animation-duration:16s; animation-delay:0s;"></div>
        <div class="mote" style="left:24%; width:4px; height:4px; animation-duration:20s; animation-delay:3s;"></div>
        <div class="mote" style="left:38%; width:2.5px; height:2.5px; animation-duration:14s; animation-delay:6s;"></div>
        <div class="mote" style="left:55%; width:3.5px; height:3.5px; animation-duration:22s; animation-delay:1.5s;"></div>
        <div class="mote" style="left:68%; width:3px; height:3px; animation-duration:18s; animation-delay:8s;"></div>
        <div class="mote" style="left:78%; width:4px; height:4px; animation-duration:24s; animation-delay:4.5s;"></div>
        <div class="mote" style="left:90%; width:2.5px; height:2.5px; animation-duration:17s; animation-delay:10s;"></div>

        <div class="bg-vignette"></div>
    </div>

    <!-- Mobile sidebar backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
           class="fixed lg:static inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0
                  transition-transform duration-200 ease-out bg-surface border-r border-line
                  flex flex-col shrink-0">

        <div class="h-16 flex items-center gap-2.5 px-6 border-b border-line">
            <svg class="w-7 h-7 shrink-0" viewBox="0 0 32 32" fill="none">
                <rect width="32" height="32" rx="9" fill="url(#logo-grad)"/>
                <path d="M16 9L25 13.2L16 17.4L7 13.2L16 9Z" fill="#0A0F1C"/>
                <path d="M11 15.5V20.4C11 21.1 13.2 22.6 16 22.6C18.8 22.6 21 21.1 21 20.4V15.5" stroke="#0A0F1C" stroke-width="1.4" fill="none"/>
                <defs>
                    <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#7C8CFB"/>
                        <stop offset="1" stop-color="#F0B23C"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="font-display font-extrabold text-[17px] tracking-tight text-white">Hogwarts - Teachers</span>
        </div>

        <nav class="flex-1 px-6 py-6 space-y-7 overflow-y-auto">
            <div>
                <p class="px-3 mb-2 text-[11px] font-semibold uppercase tracking-wider text-muted/70">Main</p>
                <div class="space-y-0.5">
                    <a href="{% url 'home' %}"
                       class="nav-link {% if request.resolver_match.url_name == 'home' %}active bg-raised text-white{% else %}text-slate-300 hover:bg-raised/60 hover:text-white{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
                        <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg>
                        Home
                    </a>
                </div>
            </div>

            <div>
                <p class="px-3 mb-2 text-[11px] font-semibold uppercase tracking-wider text-muted/70">Edu Process</p>
                <div class="space-y-0.5">
                    <a href="{% url 'st-group-list' %}"
                       class="nav-link {% if 'group' in request.resolver_match.url_name %}active bg-raised text-white{% else %}text-slate-300 hover:bg-raised/60 hover:text-white{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition">
                        <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 20v-1.5a3.5 3.5 0 0 0-3.5-3.5h-5A3.5 3.5 0 0 0 5 18.5V20"/><circle cx="9.5" cy="8.5" r="3.5"/><path d="M19 20v-1.5a3.5 3.5 0 0 0-2.5-3.36"/><path d="M14.5 5.13a3.5 3.5 0 0 1 0 6.74"/></svg>
                        My Group
                    </a>
                </div>
            </div>
        </nav>

        <div class="p-4 border-t border-line space-y-1">
            <a href="{% url 'my-profile' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-raised/60 hover:text-white transition">
                <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>
                My Profile
            </a>
            <a href="{% url 'logout' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-red-400/90 hover:bg-red-500/10 hover:text-red-300 transition">
                <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                Sign Out
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="relative z-10 flex-1 flex flex-col overflow-hidden min-w-0">
        
        <div class="flex-1 overflow-y-auto">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
                {% block content %}
                <!-- Page content will be injected here -->
                {% endblock %}
            </div>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        const toggle = document.getElementById('sidebar-toggle');

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
        }
        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
        }
        toggle?.addEventListener('click', openSidebar);
        backdrop?.addEventListener('click', closeSidebar);
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
