{% extends 'mg-base.html' %}

{% block content %}
    <h1>Teacher profile</h1>
    <img src="{{teacher.profile_img.url}}" alt="">
    <h2>{{teacher.first_name}}</h2>
    <h2>{{teacher.last_name}}</h2>
    <h2>{{teacher.email}}</h2>
    <h2>{{teacher.phone_num}}</h2>

    <h1>Groups</h1>
    {% for group in groups %}
        {{group.name}}
    {% endfor %}
{% endblock %}
