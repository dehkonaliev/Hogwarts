<h1>Groups</h1>

<h3>Search Groups</h3>
<form method="GET">
    <input type="text" name="group-name" placeholder="Group name..." required="False">
    {{form.teacher}}
    <button type="submit" name="action" value="search">Search</button>
</form>


<h3>Create Group</h3>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" name="action" value="create">Create</button>
</form>

<hr>

{% for group in groups %}
    <h2>{{group.name}}</h2>

    <h2>{{group.teacher}}</h2>
{% endfor %}
